name: func_104_summarize_chat_messages Workflow

on:
  push:
    branches:
      - main
      # добавишь сюда свою ветку при необходимости

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade importlib-metadata
        pip install requests openai

    - name: Launch the function
      run: python run_func_104_summarize_chat_messages.py
